backend:
  name: github
  repo: Letterpressed/vintageprinting-eu
  branch: main
  base_url: https://sveltia-cms-auth.ikolotas.workers.dev

media_folder: images
public_folder: images
locale: en

collections:

  - name: settings
    label: Site Settings
    files:

      - name: contact
        label: Contact & Info
        file: data/contact.json
        fields:
          - {label: Address, name: address, widget: string}
          - {label: Phone, name: phone, widget: string}
          - {label: Phone Link (no spaces), name: phone_link, widget: string, hint: 'e.g. +35725350303'}
          - {label: Email, name: email, widget: string}
          - {label: Opening Hours, name: hours, widget: string}
          - {label: Instagram Handle, name: instagram, widget: string, hint: 'e.g. @letterpressed_cy'}
          - {label: Instagram URL, name: instagram_url, widget: string}

      - name: about
        label: About the Studio
        file: data/about.json
        fields:
          - {label: Section Heading, name: heading, widget: string}
          - {label: Paragraph 1, name: para1, widget: text}
          - {label: Paragraph 2, name: para2, widget: text}
          - {label: Contact Lead Text, name: contact_lead, widget: text}

      - name: services
        label: Services
        file: data/services.json
        fields:
          - label: Services List
            name: items
            widget: list
            fields:
              - {label: Name, name: name, widget: string}
              - {label: Description, name: description, widget: text}
              - {label: Starting Price, name: price, widget: string, hint: 'e.g. From €120'}

  - name: gallery
    label: Gallery
    folder: images/gallery-cms
    create: true
    slug: '{{slug}}'
    label_singular: Image
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Image, name: image, widget: image}
      - {label: Caption, name: caption, widget: string, required: false}
